<!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <title>Dual Input</title>
      <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
     <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #d4ece0;
      }
      </style>
    </head>
    <body> 

      <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar">
          <h4 data-en="AgriVision"><img src="https://res.cloudinary.com/dzu5rgm5y/image/upload/v1752464503/logo-remove-bg_o0qxqr.png" width="40px" alt="">
             AgriVision</h4>
          <a href="index.html" data-en="Home" >Home</a>
          <a href="predict.html" data-en="Upload" class="active">Upload</a>
          <a href="#" data-en="analyze">Analyze</a>
          <a href="#" data-en="Reports">Reports</a>
        </div>

        <!-- Main Content -->
        <div class="main-content">
          <div class="top-bar">
            <h2 data-en="image Analysis">Image Analysis</h2>
            <button data-en="Reports">Reports</button>
          </div>

          <div class="row g-4">
            <!-- Button  -->
            <div class="col-6 hero-buttons w-100 text-center my-4">
                    <button onclick="startWebcam()" class="btn btn-outline-success btn-lg" data-en="📷 Take a picture">📷 Take a picture</button>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;" />
                    <label for="imageUpload" class="btn btn-outline-success btn-lg " data-en=" Upload">📂 Upload</label>
              </div>

            <!-- Image -->
            <div class="col-md-6 text-center">
              <div id="webcam-container" style="margin: auto; display:none;"></div>
              <img id="uploadedImage" style="margin: auto; width: 300px; display: none;" />
            </div>

            
            <!-- Result cards go here -->
            <div id="label-container" class="mt-4" style="max-width: 600px;"></div>

          </div>
        </div>
      </div>
    
      <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
      <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
      <script src="script.js"></script>
    </body>
    </html>
